<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Pagina Docente</title>

  <style>
    body { font-family: Arial; margin: 40px; }

    /* Banner cookie in fondo */
    #cookie-banner {
      width: 100%;
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      margin-top: 40px;
    }

    #cookie-banner a {
      color: #f1d600;
      text-decoration: underline;
    }

    #cookie-banner button {
      margin-left: 10px;
      padding: 5px 10px;
      cursor: pointer;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9em;
    }

    footer a {
      color: #000;
      text-decoration: underline;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<h1>Nome Docente</h1>
<p>Benvenuti nella mia pagina.</p>

<h2>Video lezione</h2>
<iframe width="560" height="315"
    src="https://www.youtube.com/embed/49V7uYkA-kg?si=pOpE5srO8oeLgm-I"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
</iframe>

<h2>Mappa</h2>
<iframe width="600" height="450"
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!..."
    style="border:0;"
    allowfullscreen=""
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
</iframe>

<!-- BANNER COOKIE (solo informativo, footer) -->
<div id="cookie-banner">
  Questo sito utilizza cookie e contenuti di terze parti. 
  <a href="cookies.html" target="_blank">Leggi la cookie policy</a>
  <button onclick="acceptCookies()">Chiudi</button>
</div>

<footer>
  <a href="privacy.html" target="_blank">Privacy Policy</a> |
  <a href="cookies.html" target="_blank">Cookie Policy</a>
</footer>

<script>
  // Nasconde banner se già accettati
  function acceptCookies() {
    localStorage.setItem("cookieConsent", "true");
    document.getElementById("cookie-banner").style.display = "none";
  }

  window.onload = function() {
    if (localStorage.getItem("cookieConsent") === "true") {
      document.getElementById("cookie-banner").style.display = "none";
    }
  }
</script>

</body>
</html>
